version: "3.8"

services:
  db:
    image: mysql:latest
    container_name: mysql-compose
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: my_database
    volumes:
      - mysql_db_data:/var/lib/mysql

volumes:
  mysql_db_data:
